services:
  - type: web
    name: piper-tts-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: MODELS_DIR
        value: /app/models
    healthCheckPath: /health
    # Free tier: 512MB RAM — medium models fit fine
    # Build time ~3-5 min (downloading models)
